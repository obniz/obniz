<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>obniz | Temperature Monitor</title>
  <script src="https://unpkg.com/obniz/obniz.js" crossorigin="anonymous"></script>
  <style>
    body { font-family: sans-serif; max-width: 640px; margin: 40px auto; }
    input { width: 100%; padding: 8px; box-sizing: border-box; }
    .temp { font-size: 64px; text-align: center; margin: 16px 0; font-variant-numeric: tabular-nums; }
    canvas { width: 100%; height: 200px; background: #fafafa; border: 1px solid #eee; border-radius: 6px; }
    #status { margin-top: 12px; color: #666; }
  </style>
</head>
<body>
  <h1>Temperature Monitor</h1>
  <p>LM35DZ温度センサの値をリアルタイムでグラフ表示します。配線: <code>gnd: io0 / output: io1 / vcc: io2</code>。</p>

  <label>obniz ID
    <input id="obnizId" placeholder="0000-0000" />
  </label>

  <div class="temp"><span id="temp">--</span> °C</div>
  <canvas id="chart" width="640" height="200"></canvas>
  <div id="status">Enter your obniz ID to connect.</div>

  <script>
    const idInput = document.getElementById('obnizId');
    const tempEl = document.getElementById('temp');
    const status = document.getElementById('status');
    const canvas = document.getElementById('chart');
    const ctx = canvas.getContext('2d');

    const samples = [];
    const MAX_SAMPLES = 120;

    function draw() {
      const w = canvas.width;
      const h = canvas.height;
      ctx.clearRect(0, 0, w, h);
      if (samples.length < 2) return;

      const min = Math.min(...samples) - 1;
      const max = Math.max(...samples) + 1;
      const range = max - min || 1;

      ctx.beginPath();
      samples.forEach((v, i) => {
        const x = (i / (MAX_SAMPLES - 1)) * w;
        const y = h - ((v - min) / range) * h;
        if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
      });
      ctx.strokeStyle = '#3b82f6';
      ctx.lineWidth = 2;
      ctx.stroke();
    }

    let obniz = null;

    idInput.addEventListener('change', () => {
      if (obniz) obniz.close();

      obniz = new Obniz(idInput.value);
      status.textContent = 'connecting...';

      obniz.onconnect = async () => {
        status.textContent = `connected to ${obniz.id}`;
        const sensor = obniz.wired('LM35DZ', { gnd: 0, output: 1, vcc: 2 });
        setInterval(async () => {
          const temp = await sensor.getWait();
          tempEl.textContent = temp.toFixed(1);
          samples.push(temp);
          if (samples.length > MAX_SAMPLES) samples.shift();
          draw();
        }, 1000);
      };

      obniz.onclose = () => {
        status.textContent = 'disconnected';
      };
    });
  </script>
</body>
</html>
